<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniClaw Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #1a1d27;
    --bg-hover: #242836;
    --border: #2e3347;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00b894;
    --red: #e17055;
    --orange: #fdcb6e;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--bg-card);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent-light); }
  .tabs {
    display: flex; gap: 4px; padding: 0 24px; background: var(--bg-card);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 20px; cursor: pointer; border: none; background: none;
    color: var(--text-dim); font-size: 14px; font-family: var(--font);
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }
  .content { flex: 1; overflow: auto; padding: 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .card h3 { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .stat { padding: 12px; background: var(--bg); border-radius: var(--radius); }
  .stat .label { font-size: 12px; color: var(--text-dim); }
  .stat .value { font-size: 20px; font-weight: 600; margin-top: 4px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 12px; font-weight: 500;
  }
  .badge-green { background: rgba(0,184,148,0.15); color: var(--green); }
  .badge-red { background: rgba(225,112,85,0.15); color: var(--red); }
  .badge-orange { background: rgba(253,203,110,0.15); color: var(--orange); }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 12px; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: var(--bg-hover); }

  /* Config editor */
  .config-tree { font-family: var(--mono); font-size: 13px; }
  .config-section { margin-bottom: 8px; }
  .config-key { color: var(--accent-light); }
  .config-val { color: var(--green); cursor: pointer; padding: 2px 4px; border-radius: 3px; }
  .config-val:hover { background: var(--bg-hover); }
  .config-group { margin-left: 20px; border-left: 1px solid var(--border); padding-left: 12px; }
  .config-edit {
    background: var(--bg); border: 1px solid var(--accent); color: var(--text);
    padding: 4px 8px; border-radius: 4px; font-family: var(--mono); font-size: 13px;
    outline: none; min-width: 200px;
  }

  /* Buttons */
  .btn {
    padding: 6px 14px; border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text); border-radius: var(--radius); cursor: pointer; font-size: 13px;
    font-family: var(--font); transition: all 0.2s;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: rgba(225,112,85,0.15); }
  .btn-sm { padding: 3px 10px; font-size: 12px; }

  /* Chat */
  .chat-container { display: flex; flex-direction: column; height: calc(100vh - 120px); }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: 80%; padding: 10px 14px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.6; word-wrap: break-word;
  }
  .msg-user {
    align-self: flex-end; background: var(--accent); color: #fff;
    border-bottom-right-radius: 2px;
  }
  .msg-bot {
    align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border);
    border-bottom-left-radius: 2px;
  }
  .msg-bot pre {
    background: var(--bg); padding: 10px; border-radius: 4px;
    overflow-x: auto; margin: 8px 0; font-family: var(--mono); font-size: 13px;
  }
  .msg-bot code { font-family: var(--mono); font-size: 13px; }
  .msg-bot p { margin: 4px 0; }
  .msg-error { color: var(--red); font-size: 13px; font-style: italic; }
  .msg-system { align-self: center; color: var(--text-dim); font-size: 12px; }
  .chat-input-area {
    display: flex; gap: 8px; padding: 16px;
    border-top: 1px solid var(--border); background: var(--bg-card);
  }
  .chat-input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); border-radius: var(--radius);
    font-size: 14px; font-family: var(--font); outline: none; resize: none;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-status { padding: 0 16px 8px; font-size: 12px; color: var(--text-dim); }
  .typing-indicator { display: inline-block; }
  .typing-indicator span {
    display: inline-block; width: 6px; height: 6px; margin: 0 1px;
    background: var(--text-dim); border-radius: 50%; animation: blink 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; width: 420px; max-width: 90vw;
  }
  .modal h3 { margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
  .form-group input {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); border-radius: var(--radius);
    font-size: 14px; outline: none;
  }
  .form-group input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🦀 <span>MiniClaw</span> Dashboard</h1>
    <div id="header-status"></div>
  </header>
  <div class="tabs">
    <button class="tab active" data-tab="status">状态</button>
    <button class="tab" data-tab="config">配置</button>
    <button class="tab" data-tab="chat">聊天</button>
  </div>
  <div class="content">
    <!-- Status Panel -->
    <div class="panel active" id="panel-status">
      <div class="card">
        <h3>服务状态</h3>
        <div class="stat-grid" id="status-stats"></div>
      </div>
      <div class="card">
        <h3>LLM 提供商</h3>
        <div id="status-llm"></div>
      </div>
      <div class="card">
        <h3>聊天适配器</h3>
        <div id="status-adapters"></div>
      </div>
      <div class="card">
        <h3>活跃会话</h3>
        <div id="status-sessions"></div>
      </div>
    </div>

    <!-- Config Panel -->
    <div class="panel" id="panel-config">
      <div class="card">
        <h3>聊天渠道管理</h3>
        <div id="config-chat-adapters"></div>
      </div>
      <div class="card">
        <h3>LLM 模型管理</h3>
        <div id="config-models"></div>
        <div style="margin-top: 12px;">
          <button class="btn btn-primary btn-sm" onclick="showAddModelModal()">添加提供商</button>
        </div>
      </div>
      <div class="card">
        <h3>配置项</h3>
        <div class="config-tree" id="config-tree"></div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="panel" id="panel-chat">
      <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
          <div class="msg-system">连接中...</div>
        </div>
        <div class="chat-status" id="chat-status"></div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chat-input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" disabled></textarea>
          <button class="btn btn-primary" id="chat-send" onclick="sendChat()" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Model Modal -->
<div class="modal-overlay" id="add-model-modal">
  <div class="modal">
    <h3>添加 LLM 提供商</h3>
    <div class="form-group">
      <label>名称</label>
      <input id="model-name" placeholder="e.g. deepseek" />
    </div>
    <div class="form-group">
      <label>API Base URL</label>
      <input id="model-baseurl" placeholder="https://api.deepseek.com/v1" />
    </div>
    <div class="form-group">
      <label>模型 ID</label>
      <input id="model-id" placeholder="deepseek-chat" />
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input id="model-apikey" type="password" placeholder="sk-..." />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModelModal()">取消</button>
      <button class="btn btn-primary" onclick="addModel()">添加</button>
    </div>
  </div>
</div>

<!-- DingTalk Setup Modal -->
<div class="modal-overlay" id="dingtalk-modal">
  <div class="modal">
    <h3>配置钉钉</h3>
    <div class="form-group">
      <label>Client ID</label>
      <input id="dt-client-id" placeholder="钉钉应用 Client ID" />
    </div>
    <div class="form-group">
      <label>Client Secret</label>
      <input id="dt-client-secret" type="password" placeholder="钉钉应用 Client Secret" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeDingtalkModal()">取消</button>
      <button class="btn btn-primary" onclick="saveDingtalk()">保存并启用</button>
    </div>
  </div>
</div>

<!-- Feishu Setup Modal -->
<div class="modal-overlay" id="feishu-modal">
  <div class="modal">
    <h3>配置飞书</h3>
    <div class="form-group">
      <label>App ID</label>
      <input id="fs-app-id" placeholder="飞书应用 App ID" />
    </div>
    <div class="form-group">
      <label>App Secret</label>
      <input id="fs-app-secret" type="password" placeholder="飞书应用 App Secret" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeFeishuModal()">取消</button>
      <button class="btn btn-primary" onclick="saveFeishu()">保存并启用</button>
    </div>
  </div>
</div>

<script>
// ── Tab Switching ──
const tabs = document.querySelectorAll('.tab');
const panels = document.querySelectorAll('.panel');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'status') loadStatus();
    if (tab.dataset.tab === 'config') loadConfig();
    if (tab.dataset.tab === 'chat' && !ws) connectChat();
  });
});

// ── Utility ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
  return Math.floor(diff / 86400000) + ' 天前';
}

// ── Status ──
async function loadStatus() {
  const [status, sessions, adapters, llm] = await Promise.all([
    api('GET', '/api/status'),
    api('GET', '/api/status/sessions'),
    api('GET', '/api/status/adapters'),
    api('GET', '/api/status/llm'),
  ]);

  // Stats
  document.getElementById('status-stats').innerHTML = `
    <div class="stat">
      <div class="label">运行状态</div>
      <div class="value"><span class="badge badge-green">运行中</span></div>
    </div>
    <div class="stat">
      <div class="label">PID</div>
      <div class="value">${status.pid}</div>
    </div>
    <div class="stat">
      <div class="label">运行时间</div>
      <div class="value">${formatTime(status.uptime)}</div>
    </div>
    <div class="stat">
      <div class="label">内存使用</div>
      <div class="value">${formatBytes(status.memoryUsage?.rss || 0)}</div>
    </div>
  `;

  // LLM
  const providerNames = llm.providers || [];
  document.getElementById('status-llm').innerHTML = providerNames.length === 0
    ? '<div style="color:var(--text-dim)">未配置提供商</div>'
    : providerNames.map(p => `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0">
          <span>${esc(p)}</span>
          ${p === llm.active
            ? '<span class="badge badge-green">活跃</span>'
            : `<button class="btn btn-sm" onclick="switchProvider('${esc(p)}')">切换</button>`}
        </div>
      `).join('');

  // Adapters
  document.getElementById('status-adapters').innerHTML = adapters.length === 0
    ? '<div style="color:var(--text-dim)">无适配器</div>'
    : adapters.map(a => `<span class="badge badge-green" style="margin-right:8px">${esc(a.name)}</span>`).join('');

  // Sessions
  if (sessions.length === 0) {
    document.getElementById('status-sessions').innerHTML = '<div style="color:var(--text-dim)">无活跃会话</div>';
  } else {
    document.getElementById('status-sessions').innerHTML = `
      <table>
        <tr><th>平台</th><th>Chat ID</th><th>消息数</th><th>工具</th><th>最后活跃</th></tr>
        ${sessions.map(s => `
          <tr>
            <td><span class="badge badge-orange">${esc(s.platform)}</span></td>
            <td style="font-family:var(--mono);font-size:13px">${esc(s.chatId)}</td>
            <td>${s.messageCount}</td>
            <td>${esc(s.cliTool)}</td>
            <td>${timeAgo(s.lastActiveAt)}</td>
          </tr>
        `).join('')}
      </table>
    `;
  }
}

async function switchProvider(name) {
  await api('PUT', '/api/status/llm/active', { name });
  loadStatus();
}

// ── Config ──
async function loadConfig() {
  const [config, models, chatAdapters] = await Promise.all([
    api('GET', '/api/config'),
    api('GET', '/api/config/models'),
    api('GET', '/api/config/chat'),
  ]);

  // Chat adapters
  renderChatAdapters(chatAdapters.adapters || {});

  // Models table
  const providers = models.providers || {};
  const names = Object.keys(providers);
  if (names.length === 0) {
    document.getElementById('config-models').innerHTML = '<div style="color:var(--text-dim)">未配置提供商</div>';
  } else {
    document.getElementById('config-models').innerHTML = `
      <table>
        <tr><th>名称</th><th>模型</th><th>Base URL</th><th>操作</th></tr>
        ${names.map(n => {
          const p = providers[n];
          const isDefault = n === models.defaultProvider;
          return `<tr>
            <td>${esc(n)} ${isDefault ? '<span class="badge badge-green">默认</span>' : ''}</td>
            <td style="font-family:var(--mono);font-size:13px">${esc(p.model || n)}</td>
            <td style="font-size:13px">${esc(p.baseUrl || '-')}</td>
            <td>
              ${isDefault ? '' : `<button class="btn btn-sm" onclick="setDefaultModel('${esc(n)}')">设为默认</button>`}
              <button class="btn btn-sm btn-danger" onclick="deleteModel('${esc(n)}')">删除</button>
            </td>
          </tr>`;
        }).join('')}
      </table>
    `;
  }

  // Config tree
  document.getElementById('config-tree').innerHTML = renderConfigTree(config, '');
}

function renderConfigTree(obj, prefix) {
  if (typeof obj !== 'object' || obj === null) return '';
  let html = '';
  for (const [k, v] of Object.entries(obj)) {
    const fullKey = prefix ? `${prefix}.${k}` : k;
    if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
      html += `<div class="config-section">
        <span class="config-key">${esc(k)}:</span>
        <div class="config-group">${renderConfigTree(v, fullKey)}</div>
      </div>`;
    } else {
      const display = typeof v === 'string' && v.length > 50 ? v.slice(0, 50) + '...' : String(v);
      html += `<div style="padding:3px 0">
        <span class="config-key">${esc(k)}</span>: <span class="config-val" onclick="editConfig('${esc(fullKey)}', this)" title="点击编辑">${esc(display)}</span>
      </div>`;
    }
  }
  return html;
}

function editConfig(key, el) {
  const current = el.textContent;
  const input = document.createElement('input');
  input.className = 'config-edit';
  input.value = current;
  el.replaceWith(input);
  input.focus();

  const save = async () => {
    const val = input.value;
    await api('PUT', '/api/config', { key, value: val });
    loadConfig();
  };

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') loadConfig();
  });
  input.addEventListener('blur', save);
}

async function setDefaultModel(name) {
  await api('PUT', '/api/config/models/default', { name });
  loadConfig();
}

async function deleteModel(name) {
  if (!confirm(`确定删除提供商 "${name}"？`)) return;
  await api('DELETE', '/api/config/models/' + encodeURIComponent(name));
  loadConfig();
}

function showAddModelModal() {
  document.getElementById('add-model-modal').classList.add('active');
  document.getElementById('model-name').focus();
}

function closeAddModelModal() {
  document.getElementById('add-model-modal').classList.remove('active');
  ['model-name', 'model-baseurl', 'model-id', 'model-apikey'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

async function addModel() {
  const name = document.getElementById('model-name').value.trim();
  const baseUrl = document.getElementById('model-baseurl').value.trim();
  const model = document.getElementById('model-id').value.trim();
  const apiKey = document.getElementById('model-apikey').value.trim();
  if (!name || !baseUrl || !apiKey) { alert('请填写名称、Base URL 和 API Key'); return; }
  await api('POST', '/api/config/models', { name, baseUrl, model, apiKey });
  closeAddModelModal();
  loadConfig();
}

// ── Chat Adapters Config ──
const PLATFORM_LABELS = { dingtalk: '钉钉', feishu: '飞书', web: 'Web Dashboard' };
const PLATFORM_ICONS = { dingtalk: '💬', feishu: '🐦', web: '🌐' };

function renderChatAdapters(adapters) {
  const el = document.getElementById('config-chat-adapters');
  let html = '<table><tr><th>渠道</th><th>状态</th><th>凭证</th><th>操作</th></tr>';

  for (const [platform, info] of Object.entries(adapters)) {
    const label = PLATFORM_LABELS[platform] || platform;
    const icon = PLATFORM_ICONS[platform] || '📱';
    const enabled = info.enabled;
    const badge = enabled
      ? '<span class="badge badge-green">已启用</span>'
      : '<span class="badge badge-red">未启用</span>';

    let credStatus = '';
    if (platform === 'dingtalk') {
      credStatus = `Client ID: ${info.clientId}, Secret: ${info.clientSecret}`;
    } else if (platform === 'feishu') {
      credStatus = `App ID: ${info.appId}, Secret: ${info.appSecret}`;
    } else if (platform === 'web') {
      credStatus = '<span style="color:var(--text-dim)">无需凭证</span>';
    }

    let actions = `<button class="btn btn-sm" onclick="toggleAdapter('${platform}', ${!enabled})">${enabled ? '禁用' : '启用'}</button>`;
    if (platform === 'dingtalk') {
      actions += ` <button class="btn btn-sm" onclick="showDingtalkModal()">配置</button>`;
    } else if (platform === 'feishu') {
      actions += ` <button class="btn btn-sm" onclick="showFeishuModal()">配置</button>`;
    }

    html += `<tr>
      <td>${icon} ${esc(label)}</td>
      <td>${badge}</td>
      <td style="font-size:13px">${credStatus}</td>
      <td>${actions}</td>
    </tr>`;
  }

  html += '</table>';
  html += '<div style="margin-top:8px;font-size:12px;color:var(--text-dim)">* 钉钉/飞书配置修改后需重启服务生效</div>';
  el.innerHTML = html;
}

async function toggleAdapter(platform, enabled) {
  const res = await api('PUT', `/api/config/chat/${platform}/toggle`, { enabled });
  if (res.needRestart) {
    alert(`${PLATFORM_LABELS[platform] || platform} 已${enabled ? '启用' : '禁用'}，需重启服务生效`);
  }
  loadConfig();
}

document.getElementById('feishu-modal').addEventListener('click', (e) => { if (e.target.classList.contains('modal-overlay')) closeFeishuModal(); });

// ── Chat ──
let ws = null;
let currentReply = '';
let currentBotEl = null;

function connectChat() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/api/chat/ws`);

  ws.onopen = () => {
    document.getElementById('chat-status').textContent = '';
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    switch (data.type) {
      case 'connected':
        addSystemMsg(`已连接 (${data.chatId})`);
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-send').disabled = false;
        break;
      case 'reply':
        if (!currentBotEl) {
          currentBotEl = addBotMsg('');
          currentReply = '';
        }
        currentReply += data.content;
        currentBotEl.innerHTML = renderMarkdown(currentReply);
        scrollChat();
        break;
      case 'done':
        currentBotEl = null;
        currentReply = '';
        hideTyping();
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-send').disabled = false;
        document.getElementById('chat-input').focus();
        break;
      case 'error':
        hideTyping();
        if (currentBotEl) {
          currentBotEl.innerHTML += `<div class="msg-error">${esc(data.message)}</div>`;
          currentBotEl = null;
          currentReply = '';
        } else {
          addErrorMsg(data.message);
        }
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-send').disabled = false;
        break;
    }
  };

  ws.onclose = () => {
    document.getElementById('chat-status').textContent = '连接已断开，正在重连...';
    document.getElementById('chat-input').disabled = true;
    document.getElementById('chat-send').disabled = true;
    ws = null;
    setTimeout(connectChat, 3000);
  };

  ws.onerror = () => {
    // onclose will handle reconnection
  };
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addUserMsg(text);
  showTyping();
  input.value = '';
  input.disabled = true;
  document.getElementById('chat-send').disabled = true;

  ws.send(JSON.stringify({ type: 'chat', content: text }));
}

function addUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  el.textContent = text;
  document.getElementById('chat-messages').appendChild(el);
  scrollChat();
}

function addBotMsg(html) {
  const el = document.createElement('div');
  el.className = 'msg msg-bot';
  el.innerHTML = html || '';
  document.getElementById('chat-messages').appendChild(el);
  scrollChat();
  return el;
}

function addSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg-system';
  el.textContent = text;
  document.getElementById('chat-messages').appendChild(el);
  scrollChat();
}

function addErrorMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-bot';
  el.innerHTML = `<div class="msg-error">${esc(text)}</div>`;
  document.getElementById('chat-messages').appendChild(el);
  scrollChat();
}

function showTyping() {
  document.getElementById('chat-status').innerHTML =
    '<span class="typing-indicator"><span></span><span></span><span></span></span> 思考中...';
}

function hideTyping() {
  document.getElementById('chat-status').textContent = '';
}

function scrollChat() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

function renderMarkdown(text) {
  // Code blocks
  let html = esc(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${code}</code></pre>`;
  });
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

// Chat input key handler
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Status auto-refresh
let statusInterval = null;
loadStatus();
statusInterval = setInterval(() => {
  if (document.querySelector('.tab[data-tab="status"]').classList.contains('active')) {
    loadStatus();
  }
}, 10000);

// Click outside modal to close
document.getElementById('add-model-modal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) closeAddModelModal();
});
